version: '3.9'

services:
  api:
    build:
      context: .
      target: production
    container_name: insta-reels-api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      # ── Supply these via .env file or Docker secrets ──
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_WEBHOOK_URL: ${CLOUDINARY_WEBHOOK_URL}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - reels-net

  # ── Dev-only: local Swagger UI proxy (optional) ───────────────────────────
  # swagger-ui:
  #   image: swaggerapi/swagger-ui
  #   ports:
  #     - '8080:8080'
  #   environment:
  #     SWAGGER_JSON_URL: http://api:3000/docs-json
  #   depends_on:
  #     - api
  #   networks:
  #     - reels-net

networks:
  reels-net:
    driver: bridge
